# Nginx: api.laela.online → Node API on 127.0.0.1:3001
# Public API: port 27015 (HTTPS). Port 80 only for Let's Encrypt HTTP-01.

server {
    listen 80;
    listen [::]:80;
    server_name api.laela.online;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}

server {
    listen 27015 ssl;
    listen [::]:27015 ssl;
    server_name api.laela.online;

    ssl_certificate     /etc/letsencrypt/live/api.laela.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.laela.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
