# Nginx config for api.laela.online → LaeLa ERP API (port 3001)
# Public HTTP entry: port 27015 (not 80). Port 80 kept only for Let's Encrypt.

# Let's Encrypt / Certbot validation (HTTP-01 uses port 80)
server {
    listen 80;
    listen [::]:80;
    server_name api.laela.online;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}

server {
    listen 27015;
    listen [::]:27015;
    server_name api.laela.online;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
